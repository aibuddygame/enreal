<body>
  <div id="root"></div>
  <script>
    console.log('HTML loaded, root exists:', !!document.getElementById('root'));
    document.getElementById('root').innerHTML = '<h1>HTML LOADED</h1>';
    window.onerror = function(msg, url, line, col, error) {
      console.error('GLOBAL ERROR:', msg, 'at', url, 'line', line, 'col', col);
      document.body.innerHTML = '<div style="padding:20px;font-family:sans-serif;"><h1>JavaScript Error</h1><pre style="background:#fee;padding:10px;border-radius:4px;">' + msg + '<br>at ' + url + ':' + line + '</pre></div>';
    };
  </script>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Force unregister old service workers to prevent caching issues
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(registration) {
          registration.unregister();
        });
      });
    }
  </script>
  <script>
    // Cache buster: force reload if HTML is stale
    fetch('/version.json?_=' + Date.now())
      .then(r => r.json())
      .then(v => {
        var current = localStorage.getItem('enreal-version');
        if (current && current !== v.version) {
          localStorage.setItem('enreal-version', v.version);
          window.location.reload(true);
        } else {
          localStorage.setItem('enreal-version', v.version);
        }
      });
  </script>
